#Server Configuration
server.port=8080

#datasource
#spring.datasource.url=jdbc:mysql://localhost:3306/facility_booking
#spring.datasource.username=root
#spring.datasource.password=

spring.datasource.url=jdbc:postgresql://localhost:5432/facility_booking
spring.datasource.username=postgres
spring.datasource.password=db@1234

# Turn off the Spring Boot banner
spring.main.banner-mode=off

# Reduce logging level. Set logging level to warn
logging.level.root=warn

# Add logging configs to display SQL statements
#logging.level.org.hibernate.SQL=debug
#logging.level.org.hibernate.orm.jdbc.bind=trace

# Configure JPA/Hibernate to auto create the tables
# the "update" config will keep existing data in the table
spring.jpa.hibernate.ddl-auto=update

#Spring Security user-name and password(custom)
spring.security.user.name=user
spring.security.user.password=password

